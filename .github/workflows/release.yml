name: Build and Release

on:
  push:
    tags:
      # 匹配包含release关键字的tag，版本号符合语义化版本规范
      # 例如: v1.0.0-release, release-v1.2.3, 1.0.0-release 等
      - '*release*'

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      valid: ${{ steps.validate.outputs.valid }}
    
    steps:
      - name: Validate version tag
        id: validate
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG"
          
          # 提取版本号（支持多种格式）
          # 格式1: v1.0.0-release -> 1.0.0
          # 格式2: release-v1.0.0 -> 1.0.0
          # 格式3: 1.0.0-release -> 1.0.0
          # 格式4: release-1.0.0 -> 1.0.0
          
          VERSION=""
          
          # 尝试匹配 v开头的版本号
          if [[ "$TAG" =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          # 尝试匹配纯数字版本号
          elif [[ "$TAG" =~ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          fi
          
          echo "Extracted version: $VERSION"
          
          # 验证版本号是否符合语义化版本规范 (SemVer)
          # 格式: MAJOR.MINOR.PATCH (如 1.0.0, 2.1.3)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Valid semantic version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "Invalid version format. Expected semantic version (e.g., 1.0.0)"
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: validate-version
    if: needs.validate-version.outputs.valid == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Get current version from pom.xml
        id: pom_version
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$POM_VERSION" >> $GITHUB_OUTPUT

      - name: Update pom.xml version to match tag
        run: |
          TAG_VERSION="${{ needs.validate-version.outputs.version }}"
          POM_VERSION="${{ steps.pom_version.outputs.version }}"
          echo "Tag version: $TAG_VERSION"
          echo "POM version: $POM_VERSION"
          
          # 如果版本不一致，自动更新pom.xml版本
          if [[ "$POM_VERSION" != "$TAG_VERSION" ]]; then
            echo "Updating pom.xml version from $POM_VERSION to $TAG_VERSION"
            mvn versions:set -DnewVersion=$TAG_VERSION -DgenerateBackupPoms=false
          else
            echo "Version already matches, no update needed"
          fi

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Rename JAR for release
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          SOURCE_JAR="target/helloMocker-${VERSION}.jar"
          
          # 检查JAR文件是否存在
          if [ -f "$SOURCE_JAR" ]; then
            echo "JAR already has correct name: $SOURCE_JAR"
          else
            # 如果文件名不同，尝试重命名
            echo "Looking for JAR file to rename..."
            ACTUAL_JAR=$(ls target/helloMocker-*.jar | head -1)
            if [ -n "$ACTUAL_JAR" ] && [ "$ACTUAL_JAR" != "$SOURCE_JAR" ]; then
              mv "$ACTUAL_JAR" "$SOURCE_JAR"
              echo "Renamed $ACTUAL_JAR to $SOURCE_JAR"
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helloMocker-jar
          path: target/helloMocker-*.jar

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-version, build]
    if: needs.validate-version.outputs.valid == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: helloMocker-jar
          path: ./release

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          # 获取上一个tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "## Changes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "### Commits since $PREV_TAG" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            echo "### Initial Release" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Installation" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "1. Download \`helloMocker-${VERSION}.jar\`" >> CHANGELOG.md
          echo "2. In Burp Suite, go to **Extender** > **Extensions** > **Add**" >> CHANGELOG.md
          echo "3. Select the downloaded JAR file" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HelloMocker v${{ needs.validate-version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            release/helloMocker-*.jar
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
