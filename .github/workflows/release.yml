name: Build and Release

on:
  push:
    tags:
      # 匹配正式发布版本 (包含release关键字)
      # 例如: v1.0.0-release, release-v1.2.3, 1.0.0-release 等
      - '*release*'
      # 匹配预发布版本 (alpha, beta, rc)
      # 例如: v1.0.0-alpha, v1.0.0-beta.1, v1.0.0-rc.1 等
      - 'v*.*.*-alpha*'
      - 'v*.*.*-beta*'
      - 'v*.*.*-rc*'
      - '*.*.*-alpha*'
      - '*.*.*-beta*'
      - '*.*.*-rc*'

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      full_version: ${{ steps.validate.outputs.full_version }}
      valid: ${{ steps.validate.outputs.valid }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
    
    steps:
      - name: Validate version tag
        id: validate
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG"
          
          # 提取版本号（支持多种格式）
          # 格式1: v1.0.0-release -> 1.0.0
          # 格式2: release-v1.0.0 -> 1.0.0
          # 格式3: 1.0.0-release -> 1.0.0
          # 格式4: release-1.0.0 -> 1.0.0
          # 格式5: v1.0.0-alpha.1 -> 1.0.0-alpha.1 (预发布)
          # 格式6: v1.0.0-beta -> 1.0.0-beta (预发布)
          # 格式7: v1.0.0-rc.1 -> 1.0.0-rc.1 (预发布)
          
          VERSION=""
          FULL_VERSION=""
          PRERELEASE="false"
          
          # 尝试匹配预发布版本 (alpha, beta, rc)
          if [[ "$TAG" =~ v?([0-9]+\.[0-9]+\.[0-9]+)-(alpha|beta|rc)([.0-9]*) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            PRERELEASE_TYPE="${BASH_REMATCH[2]}"
            PRERELEASE_NUM="${BASH_REMATCH[3]}"
            FULL_VERSION="${VERSION}-${PRERELEASE_TYPE}${PRERELEASE_NUM}"
            PRERELEASE="true"
            echo "Detected prerelease version: $FULL_VERSION"
          # 尝试匹配 v开头的正式版本号
          elif [[ "$TAG" =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            FULL_VERSION="$VERSION"
          # 尝试匹配纯数字版本号
          elif [[ "$TAG" =~ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            FULL_VERSION="$VERSION"
          fi
          
          echo "Extracted base version: $VERSION"
          echo "Full version: $FULL_VERSION"
          echo "Is prerelease: $PRERELEASE"
          
          # 验证版本号是否符合语义化版本规范 (SemVer)
          # 格式: MAJOR.MINOR.PATCH (如 1.0.0, 2.1.3)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Valid semantic version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          else
            echo "Invalid version format. Expected semantic version (e.g., 1.0.0)"
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  build:
    name: Build All Artifacts
    runs-on: ubuntu-latest
    needs: validate-version
    if: needs.validate-version.outputs.valid == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 获取完整历史用于changelog生成

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Get current version from pom.xml
        id: pom_version
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$POM_VERSION" >> $GITHUB_OUTPUT

      - name: Update pom.xml version to match tag
        run: |
          TAG_VERSION="${{ needs.validate-version.outputs.full_version }}"
          POM_VERSION="${{ steps.pom_version.outputs.version }}"
          echo "Tag version: $TAG_VERSION"
          echo "POM version: $POM_VERSION"
          
          # 如果版本不一致，自动更新pom.xml版本（使用Maven插件确保正确更新）
          if [[ "$POM_VERSION" != "$TAG_VERSION" ]]; then
            echo "Updating pom.xml version from $POM_VERSION to $TAG_VERSION"
            mvn versions:set -DnewVersion=$TAG_VERSION -DgenerateBackupPoms=false
          else
            echo "Version already matches, no update needed"
          fi

      # ============================================
      # 1. 构建主项目 (helloMocker-api 和 helloMocker-plugin)
      # ============================================
      - name: Build main project with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Install to local repository
        run: mvn install -DskipTests

      # ============================================
      # 2. 构建示例项目
      # ============================================
      - name: Update example projects version
        run: |
          TAG_VERSION="${{ needs.validate-version.outputs.full_version }}"
          
          # 只更新 helloMocker.version 属性（依赖版本）
          # 项目自身版本使用 mvn versions:set 更新
          
          # 更新 helloMocker-api-example
          sed -i "s|<helloMocker.version>[^<]*</helloMocker.version>|<helloMocker.version>${TAG_VERSION}</helloMocker.version>|g" examples/helloMocker-api-example/pom.xml
          cd examples/helloMocker-api-example
          mvn versions:set -DnewVersion=${TAG_VERSION} -DgenerateBackupPoms=false
          cd ../..
          
          # 更新 jar-extension
          sed -i "s|<helloMocker.version>[^<]*</helloMocker.version>|<helloMocker.version>${TAG_VERSION}</helloMocker.version>|g" examples/jar-extension/pom.xml
          cd examples/jar-extension
          mvn versions:set -DnewVersion=${TAG_VERSION} -DgenerateBackupPoms=false
          cd ../..
          
          echo "Updated example project versions to ${TAG_VERSION}"

      - name: Build helloMocker-api-example
        run: |
          cd examples/helloMocker-api-example
          mvn clean package -DskipTests

      - name: Build jar-extension example
        run: |
          cd examples/jar-extension
          mvn clean package -DskipTests

      # ============================================
      # 3. 准备发布产物
      # ============================================
      - name: Prepare release artifacts
        run: |
          VERSION="${{ needs.validate-version.outputs.full_version }}"
          
          # 创建发布目录
          mkdir -p release
          
          # 复制主插件JAR
          cp helloMocker-plugin/target/helloMocker-*.jar release/ 2>/dev/null || echo "Warning: Main plugin JAR not found"
          
          # 复制API JAR
          cp helloMocker-api/target/helloMocker-api-*.jar release/ 2>/dev/null || echo "Warning: API JAR not found"
          
          # 复制示例项目JAR
          cp examples/helloMocker-api-example/target/helloMocker-api-example-*.jar release/ 2>/dev/null || echo "Warning: API example JAR not found"
          cp examples/jar-extension/target/helloMocker-example-handler-*.jar release/ 2>/dev/null || echo "Warning: Example handler JAR not found"
          
          # 验证至少有一个文件
          if [ -z "$(ls -A release/)" ]; then
            echo "Error: No artifacts found in release directory"
            exit 1
          fi
          
          # 列出发布目录内容
          echo "Release artifacts:"
          ls -la release/

      # ============================================
      # 4. 打包示例项目源码
      # ============================================
      - name: Package example source code
        run: |
          VERSION="${{ needs.validate-version.outputs.full_version }}"
          
          # 创建临时目录用于打包
          mkdir -p temp-examples/helloMocker-api-example
          mkdir -p temp-examples/jar-extension
          
          # 复制 helloMocker-api-example 源码 (排除target目录)
          rsync -av --exclude='target' examples/helloMocker-api-example/ temp-examples/helloMocker-api-example/
          
          # 复制 jar-extension 源码 (排除target目录)
          rsync -av --exclude='target' examples/jar-extension/ temp-examples/jar-extension/
          
          # 打包所有示例源码到一个zip文件
          cd temp-examples
          zip -r "../release/examples-source-${VERSION}.zip" .
          cd ..
          
          # 清理临时目录
          rm -rf temp-examples
          
          echo "Source packages created:"
          ls -la release/*.zip

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helloMocker-release
          path: release/
          retention-days: 5

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-version, build]
    if: needs.validate-version.outputs.valid == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 获取完整历史用于changelog生成

      - name: Delete existing release if exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          # 查找并删除已存在的release
          RELEASE_ID=$(gh release view "$TAG_NAME" --json id -q '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing release with ID: $RELEASE_ID"
            gh release delete "$TAG_NAME" --yes
          else
            echo "No existing release found for tag: $TAG_NAME"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: helloMocker-release
          path: ./release

      - name: List release artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la release/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.validate-version.outputs.full_version }}"
          PRERELEASE="${{ needs.validate-version.outputs.prerelease }}"
          # 获取上一个tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # 创建CHANGELOG文件（不使用heredoc避免缩进问题）
          echo "## Release Contents" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          # 预发布版本提示
          if [ "$PRERELEASE" = "true" ]; then
            echo "> **Warning**: This is a pre-release version. It may contain bugs and is not recommended for production use." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          echo "This release includes:" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Main Plugin" >> CHANGELOG.md
          echo "- \`helloMocker-${VERSION}.jar\` - BurpSuite HTTP Mock Plugin (fat JAR with all dependencies)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### API Library" >> CHANGELOG.md
          echo "- \`helloMocker-api-${VERSION}.jar\` - HelloMocker API for developing custom extensions" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Example Extensions (Compiled JAR)" >> CHANGELOG.md
          echo "- \`helloMocker-api-example-${VERSION}.jar\` - Complete API usage example" >> CHANGELOG.md
          echo "- \`helloMocker-example-handler-${VERSION}.jar\` - Simple JAR extension example" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Example Source Code" >> CHANGELOG.md
          echo "- \`examples-source-${VERSION}.zip\` - Source code of all example projects" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Changes" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "### Commits since $PREV_TAG" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md
          else
            echo "### Initial Release" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" -20 >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Installation" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Main Plugin" >> CHANGELOG.md
          echo "1. Download \`helloMocker-${VERSION}.jar\`" >> CHANGELOG.md
          echo "2. In Burp Suite, go to **Extensions** > **Installed** > **Add**" >> CHANGELOG.md
          echo "3. Select the downloaded JAR file" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Using Example Extensions" >> CHANGELOG.md
          echo "1. First install the main plugin" >> CHANGELOG.md
          echo "2. Download the example JAR (e.g., \`helloMocker-example-handler-${VERSION}.jar\`)" >> CHANGELOG.md
          echo "3. In HelloMocker plugin, add the JAR as an extension handler" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Developing Custom Extensions" >> CHANGELOG.md
          echo "1. Add \`helloMocker-api-${VERSION}.jar\` as a dependency to your project" >> CHANGELOG.md
          echo "2. Implement the \`IMockHandler\` interface" >> CHANGELOG.md
          echo "3. See example source code for reference" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HelloMocker v${{ needs.validate-version.outputs.full_version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ needs.validate-version.outputs.prerelease == 'true' }}
          files: |
            release/helloMocker-*.jar
            release/helloMocker-api-*.jar
            release/helloMocker-api-example-*.jar
            release/helloMocker-example-handler-*.jar
            release/examples-source-*.zip
          generate_release_notes: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
